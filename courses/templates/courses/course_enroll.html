{% extends 'basemain.html' %}
{% load static %}

{% block content %}

<section class="py-20 bg-gray-50">
    <div class="max-w-3xl mx-auto px-4">

```
    <!-- Title -->
    <div class="text-center mb-10">
        <h2 class="text-3xl font-bold text-qtdBlue">Course Registration</h2>
        <p class="text-gray-500 mt-2">Fill the form to enroll in the course</p>
    </div>

    <!-- Success Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="mb-4 p-4 bg-green-100 text-green-700 rounded">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <!-- Form Card -->
    <div class="bg-white p-8 rounded-xl shadow">

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <!-- Full Name -->
            <div>
                <label class="block font-semibold mb-2">Full Name *</label>
                <input type="text" name="full_name" required
                       class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-qtdGold focus:outline-none">
            </div>

            <!-- Phone -->
            <div>
                <label class="block font-semibold mb-2">Phone Number *</label>
                <input type="text" name="phone" required
                       class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-qtdGold focus:outline-none">
            </div>

            <!-- Email -->
            <div>
                <label class="block font-semibold mb-2">Email Address</label>
                <input type="email" name="email"
                       class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-qtdGold focus:outline-none">
            </div>

            <!-- Course Dropdown -->
            <div>
                <label class="block font-semibold mb-2">Select Course *</label>
                <select name="course" required
                        class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-qtdGold focus:outline-none">
                    <option value="">-- Choose a course --</option>
                    <option value="Introduction to python">Introduction to python</option>
                    <option value="Machine Learning">Machine Learning</option>
                    <option value="Deep Learning">Deep Learning</option>
                    <option value="Microsoft Power BI Desktop">Microsoft Power BI Desktop</option>
                </select>
            </div>

            <!-- Preferred Date -->
            <div>
                <label class="block font-semibold mb-2">Preferred Start Date & Time</label>
                <input type="text" name="preferred_date"
                       class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-qtdGold focus:outline-none">
            </div>

            <!-- Experience -->
            <div>
                <label class="block font-semibold mb-2">Experience Level</label>
                <div class="flex gap-6 mt-2">
                    <label class="flex items-center gap-2">
                        <input type="radio" name="experience_level" value="Beginner">
                        Beginner
                    </label>
                    <label class="flex items-center gap-2">
                        <input type="radio" name="experience_level" value="Some Experience">
                        Some Experience
                    </label>
                </div>
            </div>

            <!-- Comments -->
            <div>
                <label class="block font-semibold mb-2">Comments</label>
                <textarea name="comments" rows="4"
                          class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-qtdGold focus:outline-none"></textarea>
            </div>

            <!-- Submit -->
            <div class="text-center">
                <button type="submit"
                        class="px-8 py-3 bg-qtdGold text-white rounded-lg font-bold hover:bg-amber-600 transition">
                    Submit Registration
                </button>
            </div>

        </form>
    </div>
</div>
```

</section>

{% endblock %}
