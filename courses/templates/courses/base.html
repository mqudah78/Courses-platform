<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}LMS{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">LMS</a>
        <ul class="navbar-nav ms-auto">
            {% if user.is_authenticated %}

       
                {% if user.profile.role == 'INSTRUCTOR' %}
                    <a class="nav-link" href="{% url 'instructor_dashboard' %}">Instructor Dashboard</a>
                    
                {% else %}
                    <a class="nav-link" href="{% url 'student_dashboard' %}">Student Dashboard</a>
                {% endif %}


                <li class="nav-item">
                    <a class="nav-link" href="{% url 'student_sessions' %}">Sessions</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                </li>
            {% endif %}
        </ul>
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
