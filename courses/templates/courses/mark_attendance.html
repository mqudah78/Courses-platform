{% extends 'courses/base.html' %}
{% block content %}
<h2>Attendance for Session: {{ session.title }}</h2>

<form method="post">
    {% csrf_token %}
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Student</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for enrollment in enrollments %}
            <tr>
                <td>{{ enrollment.student.get_full_name }}</td>
                <td>
                    <!-- Checkbox to mark present -->
                    <input type="checkbox" name="enrollment_{{ enrollment.id }}" 
                        {% if attendance_dict.enrollment.id %} checked {% endif %}>
                    Present
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button type="submit" class="btn btn-primary">Save Attendance</button>
</form>

{% endblock %}
