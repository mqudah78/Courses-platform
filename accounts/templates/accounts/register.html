
{{% extends 'basemain.html' %}

{% block title %}Register | QTD Training{% endblock %}

{% block content %}
<style>
    form p { margin-bottom: 1rem; }
    form label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.25rem; }
    form input { 
        width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.375rem; 
        outline: none; transition: border-color 0.2s;
    }
    form input:focus { border-color: #f59e0b; ring: 2px; ring-color: #f59e0b; }
</style>

<section class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-2xl w-full bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        
        <div class="text-center mb-8">
            <h2 class="font-heading text-3xl font-extrabold text-qtdBlue">Create Account</h2>
            <p class="text-gray-500 mt-2">Join the QTD professional network</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div class="text-qtdBlue">
                {{ form.as_p }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Select Your Role</label>
                <select name="role" required 
                    class="w-full p-3 border border-gray-300 rounded-md bg-white focus:ring-2 focus:ring-qtdGold focus:border-qtdGold outline-none">
                    <option value="" disabled selected>Choose your role...</option>
                    <option value="STUDENT">Student</option>
                    <option value="INSTRUCTOR">Instructor</option>
                   
                </select>
            </div>

            <div class="pt-4">
                <button type="submit" 
                    class="w-full py-4 bg-qtdBlue text-white font-bold rounded-lg hover:bg-slate-800 transition shadow-md hover:shadow-lg active:scale-[0.98]">
                    Register Now
                </button>
            </div>
        </form>

        <p class="text-center text-sm text-gray-600 mt-6">
            Already have an account? 
            <a href="{% url 'login' %}" class="text-qtdGold font-semibold hover:underline">Log in here</a>
        </p>
    </div>
</section>
{% endblock %}
